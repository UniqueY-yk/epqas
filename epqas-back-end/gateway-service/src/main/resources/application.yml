server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: core-service
          uri: lb://core-service
          predicates:
            - Path=/api/core/**
          filters:
            - StripPrefix=1
        - id: exam-service
          uri: lb://exam-service
          predicates:
            - Path=/api/exam/**
          filters:
            - StripPrefix=1
        - id: analysis-service
          uri: lb://analysis-service
          predicates:
            - Path=/api/analysis/**
          filters:
            - StripPrefix=1
