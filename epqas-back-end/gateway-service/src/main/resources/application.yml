# ============================================================
# Generate self-signed SSL certificate (run this command ONCE):
#
# keytool -genkeypair -alias epqas-gateway -keyalg RSA -keysize 2048 ^
#   -storetype PKCS12 -keystore src/main/resources/keystore.p12 ^
#   -validity 3650 -storepass epqas2026 ^
#   -dname "CN=localhost, OU=EPQAS, O=University, L=City, ST=Province, C=CN"
#
# Then place keystore.p12 in gateway-service/src/main/resources/
# ============================================================

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-store-password: epqas2026
    key-alias: epqas-gateway

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: auth-service-users
          uri: lb://auth-service
          predicates:
            - Path=/users/**
        - id: academic-service
          uri: lb://academic-service
          predicates:
            - Path=/academic/**
          filters:
            - StripPrefix=1
        - id: question-service
          uri: lb://question-service
          predicates:
            - Path=/question/**
          filters:
            - StripPrefix=1
        - id: exam-service
          uri: lb://exam-service
          predicates:
            - Path=/exam/**
          filters:
            - StripPrefix=1
        - id: analysis-service
          uri: lb://analysis-service
          predicates:
            - Path=/analysis/**
          filters:
            - StripPrefix=1
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/audit/**
          filters:
            - StripPrefix=1
        - id: backup-service
          uri: lb://audit-service
          predicates:
            - Path=/backup/**
        - id: suggestion-service
          uri: lb://suggestion-service
          predicates:
            - Path=/suggestions/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
